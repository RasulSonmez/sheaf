<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sheaf — PDF Scanner &amp; Editor</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    color: #1c1c1e; background: #fff; padding: 24px;
  }
  @media (prefers-color-scheme: dark) { body { color:#e6e6ea; background:#0f0f12; } a.link{ color:#5aa9ff; } }
  .box { max-width: 520px; text-align: center; }
  .logo { width: 76px; height: 76px; border-radius: 18px; background: linear-gradient(135deg,#0a66ff,#5aa9ff); margin: 0 auto 18px; display:grid; place-items:center; color:#fff; font-size:38px; font-weight:700; }
  h1 { font-size: 28px; letter-spacing: -0.02em; margin: 0 0 6px; }
  p { color: #8a8a8e; margin: 0 0 28px; }
  .links { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  a.link { display:inline-block; padding:11px 18px; border-radius:12px; background:#f0f0f3; color:#0a66ff; font-weight:600; text-decoration:none; }
  @media (prefers-color-scheme: dark){ a.link{ background:#1a1a1f; } }
  a.link:hover { opacity:.9; }
</style>
</head>
<body>
  <div class="box">
    <div class="logo">S</div>
    <h1>Sheaf</h1>
    <p>PDF Scanner &amp; Editor — private by design, 100% on your device.</p>
    <div class="links">
      <a class="link" href="privacy/">Privacy Policy</a>
      <a class="link" href="terms/">Terms of Use</a>
      <a class="link" href="support/">Support</a>
    </div>
  </div>
</body>
</html>
